<h2 id="authTitle">🌱 Login to AgriChain Pro</h2>
<p class="sub" id="authSub">Access your dashboard</p>

<!-- LOGIN FORM -->
<form id="loginForm" class="auth-form">
  <input type="email" id="loginEmail" placeholder="Email" required />
<input type="password" id="loginPassword" placeholder="Password" required />
  <button type="submit" class="start-btn full">Login</button>
  <div class="divider">OR</div>

  <div id="g_id_onload"
    data-client_id="973035555918-s5k823e130l5n54c3u2r7tf3aag8d1vq.apps.googleusercontent.com"
    data-callback="handleCredentialResponse"
    data-auto_prompt="false">
  </div>

  <div class="g_id_signin"
    data-type="standard"
    data-size="large"
    data-theme="outline"
    data-text="continue_with"
    data-shape="pill"
    data-logo_alignment="left">
  </div>
</form>

<!-- SIGNUP FORM -->
<form id="signupForm" class="auth-form hidden">
<input type="text" name="name" placeholder="Full Name" required />
<input type="email" name="email" placeholder="Email" required />
<input type="password" name="password" placeholder="Password" required />

<select name="role" required>
  <option value="">Select Role</option>
  <option>Farmer</option>
  <option>Transporter</option>
  <option>Vendor</option>
</select>
  <button type="submit" class="start-btn full">Create Account</button>
</form>

<p class="toggle-text">
  <span id="toggleText">Don’t have an account?</span>
  <button type="button" class="link-btn" onclick="toggleAuth()">Sign up</button>
</p>
